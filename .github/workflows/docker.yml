name: Docker (Test)

on:
  push:
    branches:
      - main
      - test
    paths-ignore:
      - "**/README*"
      - "docs/**"
      - ".github/workflows/*publish*.yml"

env:
  TEST_TAG: kism/archivepodcast:test
  PYTEST_TAG: kism/archivepodcast:pytest
  LAMBDA_TAG: kism/archivepodcast:lambda

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build main docker
        run: docker build -f docker/main.Dockerfile -t ${{ env.TEST_TAG }} .

      - name: Run adhoc
        run: docker run --rm ${{ env.TEST_TAG }} archivepodcast

      - name: Build pytest docker
        run: docker build -f docker/pytest.Dockerfile -t ${{ env.PYTEST_TAG }} .

      - name: Run pytest
        run: docker run --rm ${{ env.PYTEST_TAG }} pytest tests/

      - name: Build lambda docker
        run: docker build -f docker/lambda.Dockerfile -t ${{ env.LAMBDA_TAG }} .
