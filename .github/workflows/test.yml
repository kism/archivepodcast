---
name: Test

on:
  push:
    branches:
      - main
      - test
    paths-ignore:
      - "**/README*"
      - "docs/**"
      - ".github/workflows/*publish*.yml"
      - ".github/workflows/*docker*.yml"
      - "scripts/**"
      - "docker/**"

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Install ffmpeg (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: ffmpeg
          version: 1.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --extra test

      - name: Ensure that pytest isnt getting polluted by the default instance dir.
        run: |
          mkdir -p instance
          echo 'ensuring that this never gets touched by pytest' > instance/config.json
          chmod 000 instance/config.json

      - name: Test with pytest
        run: .venv/bin/pytest --cov-report=xml # xml report needed for codecov, other config from pyproject.toml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - name: Install bun
        uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
